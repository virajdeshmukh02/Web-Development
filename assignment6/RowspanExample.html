<html>
<head>
<title>Grocery Bill - Rowspan Example</title>
</head>

<body bgcolor="#ADD8E6" >

<table align="center" border="3" cellpadding="8" width="75%">

<caption><mark><b>Grocery Bill</b></mark></caption>

<tr bgcolor="#87CEEB">
<th>Category</th>
<th>Sr.No</th>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
</tr>

<tr bgcolor="#E6E6FA">
<td rowspan="2">Grains</td>
<td>1</td>
<td>Rice</td>
<td>2</td>
<td>100</td>
</tr>

<tr bgcolor="#E6E6FA">
<td>2</td>
<td>Wheat</td>
<td>3</td>
<td>150</td>
</tr>


<tr bgcolor="#E6E6FA">
<td rowspan="2">Pulses</td>
<td>3</td>
<td>Dal</td>
<td>2</td>
<td>120</td>
</tr>

<tr bgcolor="#E6E6FA">
<td>4</td>
<td>Moong</td>
<td>1</td>
<td>80</td>
</tr>


<tr bgcolor="#E6E6FA">
<td rowspan="2">Others</td>
<td>5</td>
<td>Coconut</td>
<td>5</td>
<td>50</td>
</tr>

<tr bgcolor="#E6E6FA">
<td>6</td>
<td>Pen</td>
<td>10</td>
<td>300</td>
</tr>



<tr bgcolor="#D3D3D3">
<td colspan="3" rowspan="2" align="center"><b>Total</b></td>
<td align="center">23</td>
<td align="center">800</td>
</tr>

<tr bgcolor="#F5F5DC">
<td align="center">--</td>
<td align="center">Rupees</td>
</tr>

</table>

</body>
</html>
