<html>
<head>
<title> Bill - Colspan Example</title>
</head>

<body bgcolor="#B6FF9E">

<table align="center" border="3" cellpadding="8" width="75%">


<caption><mark><b>Grocerry bill</b></mark></caption>
<tr bgcolor="#DCEEFF">
<th>sr.no</th>
<th>item</th>
<th>old price</th>
<th>new price</th>
</tr>

<tr bgcolor="#EDE7F6">
<td>1</td>
<td>apple</td>
<td colspan="2" align="center">50+50ruppes</td>
</tr>

<tr bgcolor="#EDE7F6">
<td>2</td>
<td>mango</td>
<td colspan="2" align="center">60+40ruppes</td>
</tr>

<tr bgcolor="#EDE7F6">
<td>3</td>
<td>fig</td>
<td colspan="2" align="center">100+200ruppes</td>
</tr>



<tr bgcolor="#EDE7F6">
<td>4</td>
<td>banana</td>
<td colspan="2" align="center">50+150ruppes</td>
</tr>

<tr bgcolor="#EDE7F6">
<td>5</td>
<td>graphs</td>
<td colspan="2" align="center">100+200ruppes</td>
</tr>

<tr bgcolor="#FFE5B4">
<td colspan=2>Total</td>
<td colspan="2" align="center">1300rupees</td>
</tr>

</table>



</body>
</html>
