<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Controls Example</title>
</head>
<body>

<h2>HTML Form Controls Example</h2>

<form action="submit.php" method="post">

    
    <label>First Name:</label>
    <input type="text" name="fullname" required>
    <br><br>

    <label>Midd Name:</label>
    <input type="text" name="fullname" required>
    <br><br>

    <label>Last Name:</label>
    <input type="text" name="fullname" required>
    <br><br>


   
    <label>Mobile No:</label>
    <input type="text" name="Mobile No">
    <br><br>

    
    <label>Email:</label>
    <input type="email" name="email">
    <br><br>

    
    <label>Gender:</label>
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female
    <br><br>

    
    <label>Skills:</label>
    <input type="checkbox" name="skill" value="java"> Java
    <input type="checkbox" name="skill" value="python"> Python
    <br><br>

    
    <label>Course:</label>
    <select name="branch">
        <option>ENTC</option>
        <option>CSE</option>
        <option>CIVIL</option>
    </select>
    <br><br>

    
    <label>Address:</label><br>
    <textarea name="address" rows="4" cols="30"></textarea>
    <br><br>

    
  

    
    <input type="submit" value="Register">
    <input type="reset" value="Clear">

</form>
</body>
</html>
