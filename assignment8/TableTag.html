<!DOCTYPE html>
<html>
<head>
<title>Assignment No.8 - Table Tag</title>

<style>
body{
font-family: Arial, sans-serif;
background-color:#f2f2f2;
}

h2{
text-align:center;
}

table{
width:80%;
margin:auto;
border-collapse:collapse;
background-color:white;
}

th, td{
border:2px solid black;
padding:10px;
text-align:center;
}

th{
background-color:#4CAF50;
color:white;
}

caption{
font-size:22px;
font-weight:bold;
padding:10px;
}
</style>

</head>

<body>
